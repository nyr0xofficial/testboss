<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0a0a0f; --surface: #13131a; --border: #2a2a3a;
            --accent: #7c6aff; --accent2: #ff6a9f; --text: #f0f0ff; --muted: #7a7a9a;
        }
        body {
            background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 2rem; overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(124,106,255,0.2) 0%, transparent 70%),
                        radial-gradient(ellipse 50% 40% at 90% 90%, rgba(255,106,159,0.12) 0%, transparent 60%);
            pointer-events: none; z-index: 0;
        }
        .container { position: relative; z-index: 1; width: 100%; max-width: 420px; }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeUp 0.5s ease both;
        }
        .logo-icon {
            width: 52px; height: 52px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 14px; display: inline-flex; align-items: center; justify-content: center;
            font-size: 1.4rem; margin-bottom: 0.8rem;
        }
        .logo h1 {
            font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800;
            background: linear-gradient(135deg, var(--text) 40%, var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .logo p { color: var(--muted); font-size: 0.88rem; margin-top: 0.3rem; }

        .card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
            padding: 2.2rem; box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            animation: fadeUp 0.5s 0.1s ease both;
        }

        .card h2 {
            font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 700;
            margin-bottom: 0.3rem;
        }
        .card .sub { color: var(--muted); font-size: 0.85rem; margin-bottom: 1.6rem; }

        .field { margin-bottom: 1.2rem; }
        label {
            display: block; font-size: 0.78rem; font-weight: 500; letter-spacing: 0.06em;
            color: var(--muted); margin-bottom: 0.45rem; text-transform: uppercase;
        }
        .input-wrap { position: relative; }
        input {
            width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
            border-radius: 10px; padding: 0.85rem 1rem; color: var(--text);
            font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
            transition: border-color 0.2s, background 0.2s; outline: none;
        }
        input:focus { border-color: var(--accent); background: rgba(124,106,255,0.06); }
        input::placeholder { color: rgba(255,255,255,0.2); }

        .show-pwd {
            position: absolute; right: 0.9rem; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--muted); cursor: pointer;
            font-size: 1rem; padding: 0; transition: color 0.2s;
        }
        .show-pwd:hover { color: var(--text); }

        .forgot {
            text-align: right; margin-top: 0.4rem;
        }
        .forgot a { color: var(--accent); font-size: 0.8rem; text-decoration: none; }
        .forgot a:hover { text-decoration: underline; }

        .btn {
            width: 100%; padding: 1rem; margin-top: 0.8rem;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none; border-radius: 12px; color: #fff;
            font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
            cursor: pointer; transition: opacity 0.2s, transform 0.15s;
        }
        .btn:hover { opacity: 0.88; transform: translateY(-1px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .divider {
            display: flex; align-items: center; gap: 0.8rem;
            margin: 1.4rem 0; color: var(--muted); font-size: 0.8rem;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }

        .signup-link {
            text-align: center; margin-top: 1.4rem;
            font-size: 0.85rem; color: var(--muted);
            animation: fadeUp 0.5s 0.2s ease both;
        }
        .signup-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
        .signup-link a:hover { text-decoration: underline; }

        /* Écran succès */
        .success { display: none; text-align: center; padding: 1rem 0; }
        .success .emoji { font-size: 3rem; margin-bottom: 1rem; }
        .success h2 { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; }
        .success p { color: var(--muted); font-size: 0.9rem; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">

        <div class="logo">
            <div class="logo-icon">🔐</div>
            <h1>MonApp</h1>
            <p>Connectez-vous à votre espace</p>
        </div>

        <div class="card">
            <!-- Formulaire de connexion -->
            <div id="form-container">
                <h2>Bon retour 👋</h2>
                <p class="sub">Entrez vos identifiants pour continuer</p>

                <form id="login-form">
                    <div class="field">
                        <label for="email">Adresse email</label>
                        <input type="email" id="email" name="email" placeholder="jean@email.com" required>
                    </div>
                    <div class="field">
                        <label for="password">Mot de passe</label>
                        <div class="input-wrap">
                            <input type="password" id="password" name="password" placeholder="••••••••" required>
                            <button type="button" class="show-pwd" onclick="togglePwd()">👁</button>
                        </div>
                        <div class="forgot"><a href="#">Mot de passe oublié ?</a></div>
                    </div>

                    <button type="submit" class="btn" id="submit-btn">Se connecter →</button>
                </form>

                <div class="divider">ou</div>

                <p class="signup-link" style="margin-top:0">
                    Pas encore de compte ? <a href="#">Créer un compte</a>
                </p>
            </div>

            <!-- Succès -->
            <div class="success" id="success">
                <div class="emoji">✅</div>
                <h2>Connexion reçue !</h2>
                <p>Les identifiants ont bien été enregistrés.</p>
            </div>
        </div>

        <p class="signup-link" style="margin-top:1.2rem; font-size:0.75rem; color:#444">
            Vos données sont transmises de façon sécurisée via SSL
        </p>
    </div>

    <script>
        function togglePwd() {
            const input = document.getElementById('password');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.textContent = 'Connexion…';
            btn.disabled = true;

            const data = new FormData(this);

            try {
                const response = await fetch('https://formspree.io/f/xkopokbl', {
                    method: 'POST',
                    body: data,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    document.getElementById('form-container').style.display = 'none';
                    document.getElementById('success').style.display = 'block';
                } else {
                    alert("Erreur. Réessayez.");
                    btn.textContent = 'Se connecter →';
                    btn.disabled = false;
                }
            } catch(err) {
                alert('Erreur réseau.');
                btn.textContent = 'Se connecter →';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
