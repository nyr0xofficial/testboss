<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire de contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --border: #2a2a3a;
            --accent: #7c6aff;
            --accent2: #ff6a9f;
            --text: #f0f0ff;
            --muted: #7a7a9a;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(124,106,255,0.18) 0%, transparent 70%),
                        radial-gradient(ellipse 50% 40% at 90% 90%, rgba(255,106,159,0.10) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
        }

        .header {
            margin-bottom: 2.5rem;
            animation: fadeUp 0.6s ease both;
        }

        .tag {
            display: inline-block;
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent);
            border: 1px solid rgba(124,106,255,0.3);
            padding: 0.3rem 0.8rem;
            border-radius: 100px;
            margin-bottom: 1rem;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2rem, 5vw, 2.8rem);
            font-weight: 800;
            line-height: 1.1;
            background: linear-gradient(135deg, var(--text) 40%, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            margin-top: 0.75rem;
            color: var(--muted);
            font-size: 0.95rem;
            font-weight: 300;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.2rem;
            animation: fadeUp 0.6s 0.1s ease both;
            box-shadow: 0 30px 80px rgba(0,0,0,0.4);
        }

        .field {
            margin-bottom: 1.4rem;
        }

        label {
            display: block;
            font-size: 0.82rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            color: var(--muted);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        input, textarea {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.85rem 1rem;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.2s, background 0.2s;
            outline: none;
            resize: none;
        }

        input:focus, textarea:focus {
            border-color: var(--accent);
            background: rgba(124,106,255,0.06);
        }

        input::placeholder, textarea::placeholder {
            color: rgba(255,255,255,0.18);
        }

        .btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 12px;
            color: #fff;
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: opacity 0.2s, transform 0.15s;
        }

        .btn:hover { opacity: 0.88; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }

        .admin-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.82rem;
            color: var(--muted);
            animation: fadeUp 0.6s 0.2s ease both;
        }

        .admin-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }
        .admin-link a:hover { text-decoration: underline; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="tag">✦ Formulaire</span>
            <h1>Laissez-nous<br>un message.</h1>
            <p class="subtitle">Toutes les informations saisies sont enregistrées de façon sécurisée.</p>
        </div>

        <div class="card">
            <form action="/api/envoyer" method="POST">
                <div class="field">
                    <label for="nom">Nom complet</label>
                    <input type="text" id="nom" name="nom" placeholder="Jean Dupont" required>
                </div>
                <div class="field">
                    <label for="email">Adresse email</label>
                    <input type="email" id="email" name="email" placeholder="jean@email.com" required>
                </div>
                <div class="field">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="4" placeholder="Écrivez votre message ici…" required></textarea>
                </div>
                <button type="submit" class="btn">Envoyer →</button>
            </form>
        </div>

        <p class="admin-link">
            Accès admin : <a href="/admin">Voir les soumissions</a>
        </p>
    </div>
</body>
</html>
